<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edu-Trash AR</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#111; color:#fff; text-align:center; }
    video { width:100%; height:80vh; object-fit:cover; }
    .controls { padding:15px; }
    button {
      padding:12px 20px; border:none; border-radius:10px;
      background:#28a745; color:white; font-size:16px; cursor:pointer;
      margin:5px;
    }
    #info {
      padding:10px; background:#222; margin:10px; border-radius:10px;
    }
  </style>
</head>
<body>
  <h2>📷 Edu-Trash AR</h2>
  <video id="camera" autoplay playsinline></video>
  <div class="controls">
    <button onclick="switchCamera()">Balik ke Kamera Belakang/Depan</button>
    <button onclick="scanTrash()">Scan Sampah</button>
  </div>
  <div id="info">Arahkan kamera ke objek sampah untuk belajar.</div><script>
let currentFacingMode = "user";
let stream;
const video = document.getElementById('camera');

async function startCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: currentFacingMode }
    });
    video.srcObject = stream;
  } catch (err) {
    alert('Kamera tidak bisa diakses: ' + err.message);
  }
}

function switchCamera() {
  currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
  startCamera();
}

function scanTrash() {
  document.getElementById('info').innerHTML = `♻️ Terdeteksi: Botol Plastik<br>
  Jenis: Anorganik<br>
  Bisa didaur ulang menjadi pot tanaman.`;
}

startCamera();
</script></body>
</html>
