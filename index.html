<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edu-Trash AR</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    overflow: hidden;
}

#camera-container {
    position: relative;
    width: 100vw;
    height: 100vh;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border: 4px solid rgba(0,255,100,0.7);
    box-sizing: border-box;
    pointer-events: none;
}

.controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
}

button {
    padding: 14px 22px;
    margin: 8px;
    border: none;
    border-radius: 12px;
    background: #22c55e;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

#info-panel {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    background: rgba(15,23,42,0.9);
    padding: 16px;
    border-radius: 14px;
    max-height: 45%;
    overflow-y: auto;
}

h2 {
    margin-top: 0;
    color: #4ade80;
}
</style>
</head>
<body>

<div id="camera-container">
    <video id="video" autoplay playsinline></video>
    <div class="overlay"></div>

    <div id="info-panel">
        <h2>Edu-Trash AR</h2>
        <p>Arahkan kamera ke objek sampah lalu tekan scan.</p>
    </div>

    <div class="controls">
        <button onclick="switchCamera()">🔄 Balik Kamera</button>
        <button onclick="scanTrash()">📷 Scan Sampah</button>
    </div>
</div>

<script>
let currentFacingMode = "environment";
let stream;

const video = document.getElementById("video");

async function startCamera() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }

    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: currentFacingMode
            }
        });

        video.srcObject = stream;
    } catch (err) {
        alert("Kamera tidak bisa diakses: " + err);
    }
}

function switchCamera() {
    currentFacingMode =
        currentFacingMode === "environment" ? "user" : "environment";
    startCamera();
}

function scanTrash() {
    const trashData = [
        {
            name: "Botol Plastik",
            type: "Anorganik",
            desc: `
            <h2>Botol Plastik</h2>
            <p><b>Jenis:</b> Sampah Anorganik</p>
            <p><b>Karakteristik:</b> Tidak mudah terurai secara alami.</p>
            <p><b>Waktu terurai:</b> 450 - 1000 tahun.</p>
            <p><b>Dampak:</b></p>
            <ul>
                <li>Mencemari tanah dan laut</li>
                <li>Membahayakan hewan laut</li>
                <li>Menghasilkan mikroplastik</li>
            </ul>
            <p><b>Cara Pengolahan:</b></p>
            <ul>
                <li>Reduce: kurangi penggunaan plastik sekali pakai</li>
                <li>Reuse: gunakan ulang</li>
                <li>Recycle: daur ulang jadi pot bunga / ecobrick</li>
            </ul>
            `
        },
        {
            name: "Kulit Pisang",
            type: "Organik",
            desc: `
            <h2>Kulit Pisang</h2>
            <p><b>Jenis:</b> Sampah Organik</p>
            <p><b>Karakteristik:</b> Mudah terurai alami.</p>
            <p><b>Waktu terurai:</b> 2 - 5 minggu.</p>
            <p><b>Manfaat:</b></p>
            <ul>
                <li>Bisa jadi kompos</li>
                <li>Pupuk tanaman</li>
                <li>Pakan ternak tertentu</li>
            </ul>
            <p><b>Pengolahan:</b></p>
            <ul>
                <li>Masukkan ke komposter</li>
                <li>Campur tanah</li>
                <li>Fermentasi menjadi pupuk cair</li>
            </ul>
            `
        },
        {
            name: "Kaleng Minuman",
            type: "Anorganik",
            desc: `
            <h2>Kaleng Minuman</h2>
            <p><b>Jenis:</b> Sampah Anorganik</p>
            <p><b>Bahan:</b> Aluminium</p>
            <p><b>Waktu terurai:</b> 80 - 200 tahun</p>
            <p><b>Kelebihan:</b></p>
            <ul>
                <li>Bisa didaur ulang berkali-kali</li>
                <li>Bernilai ekonomis</li>
            </ul>
            <p><b>Daur Ulang:</b></p>
            <ul>
                <li>Dilebur kembali</li>
                <li>Dijadikan kerajinan</li>
                <li>Bank sampah</li>
            </ul>
            `
        }
    ];

    const randomTrash = trashData[Math.floor(Math.random() * trashData.length)];
    document.getElementById("info-panel").innerHTML = randomTrash.desc;
}

startCamera();
</script>

</body>
</html>
