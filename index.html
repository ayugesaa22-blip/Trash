<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edu-Trash AR</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#0f172a;color:white;text-align:center}
    header{padding:30px;background:#1e293b}
    .card{background:#334155;margin:20px auto;padding:20px;border-radius:16px;max-width:400px}
    button{padding:12px 24px;border:none;border-radius:10px;background:#22c55e;color:white;font-size:16px;cursor:pointer}
    video{width:90%;max-width:500px;border-radius:12px;margin-top:20px}
  </style>
</head>
<body>
  <header>
    <h1>Edu-Trash AR</h1>
    <p>Belajar memilah sampah dengan Augmented Reality</p>
  </header>
  <div class="card">
    <h2>Scan Objek Sampah</h2>
    <p>Arahkan kamera ke marker untuk melihat objek 3D dan edukasi interaktif.</p>
    <button onclick="startAR()">Mulai Scan</button>
    <video id="camera" autoplay></video>
  </div>
  <script>
    async function startAR(){
      const video=document.getElementById('camera');
      const stream=await navigator.mediaDevices.getUserMedia({video:true});
      video.srcObject=stream;
      alert('Kamera aktif! Integrasikan dengan AR.js untuk fitur AR penuh.');
    }
  </script>
</body>
</html>
